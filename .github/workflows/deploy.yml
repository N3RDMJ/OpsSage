name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: prod
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr

      - run: pnpm install --frozen-lockfile=false
      - run: pnpm build

      - name: Build & push agent image
        run: |
          IMAGE="${{ steps.ecr.outputs.registry }}/opssage/agent:${GITHUB_SHA}"
          docker build -f apps/agent/Dockerfile -t "$IMAGE" -t "${{ steps.ecr.outputs.registry }}/opssage/agent:latest" .
          docker push "$IMAGE"
          docker push "${{ steps.ecr.outputs.registry }}/opssage/agent:latest"

      - name: Build & push sandbox image
        run: |
          IMAGE="${{ steps.ecr.outputs.registry }}/opssage/sandbox:${GITHUB_SHA}"
          docker build -f apps/sandbox/Dockerfile -t "$IMAGE" -t "${{ steps.ecr.outputs.registry }}/opssage/sandbox:latest" .
          docker push "$IMAGE"
          docker push "${{ steps.ecr.outputs.registry }}/opssage/sandbox:latest"

      - name: cdk deploy
        working-directory: infra
        env:
          OPSSAGE_ALB_CERT_ARN: ${{ secrets.OPSSAGE_ALB_CERT_ARN }}
          OPSSAGE_ALERT_CHANNEL: ${{ vars.OPSSAGE_ALERT_CHANNEL }}
        run: pnpm exec cdk deploy --all --require-approval never

      - name: Smoke /healthz
        env:
          ALB_URL: ${{ vars.OPSSAGE_ALB_URL }}
        run: |
          if [ -z "${ALB_URL}" ]; then
            echo "OPSSAGE_ALB_URL var is unset; skipping smoke."
            exit 0
          fi
          curl --fail --max-time 10 "${ALB_URL}/healthz"
